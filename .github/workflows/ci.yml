name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test-and-self-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest

      - name: Run SentinelForge self-scan
        run: uv run sentinelforge scan --target . --mode static --output-dir reports

      - name: Enforce minimum security grade
        run: uv run sentinelforge gate --report reports/latest_report.json --minimum-grade B

      - name: Upload SentinelForge reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: sentinelforge-reports
          path: reports/
