name: Security Baseline Review Request
description: Request a paid or beta SentinelForge security baseline review for your app or client project.
title: "Security Baseline Review Request: <short project name>"
labels: ["security-review", "paid-support"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your interest in a SentinelForge Security Baseline Review.

        Do not paste private code, API keys, passwords, tokens, `.env` files, client data, or confidential business details into this public issue.

  - type: dropdown
    id: review_type
    attributes:
      label: What kind of review are you interested in?
      options:
        - Mini review ($49 beta)
        - Standard review ($149 beta)
        - Review + GitHub Actions setup ($499 beta)
        - Not sure yet
    validations:
      required: true

  - type: dropdown
    id: project_type
    attributes:
      label: What kind of project is this?
      options:
        - AI-built app
        - Freelance/client project
        - SaaS/MVP
        - Automation/API project
        - Agency project
        - Other
    validations:
      required: true

  - type: input
    id: stack
    attributes:
      label: Tech stack
      description: |
        Example: Python/FastAPI/Postgres, Next.js/Supabase, Laravel/MySQL, etc.
      placeholder: "Next.js + Supabase + OpenAI API"
    validations:
      required: false

  - type: textarea
    id: goal
    attributes:
      label: What are you trying to ship?
      description: Keep this high-level. Do not include private code or secrets.
      placeholder: "I am launching an AI scheduling app and want to know if there are obvious risks before users try it."
    validations:
      required: true

  - type: checkboxes
    id: authorization
    attributes:
      label: Authorization
      options:
        - label: I own this project or have permission to request a security review.
          required: true
        - label: I understand I should not post secrets or private code in this public issue.
          required: true
