name: Bug Report
description: Report a SentinelForge bug.
title: "Bug: <short description>"
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug.

        Do not paste secrets, private code, tokens, passwords, `.env` files, or client data.

  - type: textarea
    id: bug
    attributes:
      label: What happened?
      placeholder: "Describe the problem."
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: How can we reproduce it?
      placeholder: |
        1. Run ...
        2. See ...
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: SentinelForge version
      placeholder: "sentinelforge --version or package version"
    validations:
      required: false

  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed secrets/private data from this report.
          required: true
