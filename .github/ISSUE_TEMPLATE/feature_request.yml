name: Feature Request
description: Suggest a SentinelForge improvement.
title: "Feature: <short description>"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      placeholder: "Explain the user pain or workflow."
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: What should SentinelForge do?
      placeholder: "Describe the feature idea."
    validations:
      required: true

  - type: dropdown
    id: audience
    attributes:
      label: Who would this help?
      options:
        - Solo founder / MVP builder
        - Freelancer
        - Agency
        - Small SaaS team
        - Security engineer
        - Other
    validations:
      required: false
